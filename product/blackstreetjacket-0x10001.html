<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAJW — Product</title>

<link rel="icon" type="image/png" href="HajwFavicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky: #38bdf8;
  --sky-dim: rgba(56,189,248,0.12);
  --bg: #050508;
  --text: #e8eaf0;
  --muted: #5a6070;
  --border: rgba(56,189,248,0.15);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER SAME */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #000;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 90px;
}

.logo { height: 83px; }

nav { display: flex; gap: 8px; }
nav a {
  color: var(--muted);
  text-decoration: none;
  font-size: 14px;
  padding: 8px 14px;
  text-transform: uppercase;   /* 👈 ADD THIS */
  letter-spacing: 0.06em;      /* 👈 OPTIONAL (matches your main page) */
}
nav a:hover { color: var(--sky); }

/* PRODUCT PAGE */
.product-page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 60px 40px;
  align-items: center;
}

.product-image {
  display: flex;
  justify-content: center;
}

.product-image img {
  width: 50%;
  max-width: 400px;
  border-radius: 8px;
}

.product-details {
  text-align: left;
}

.product-title {
  font-family: 'Bebas Neue';
  font-size: 60px;
  margin-bottom: 10px;
}

.product-price {
  color: var(--sky);
  font-size: 22px;
  margin-bottom: 20px;
}

.product-desc {
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 30px;
}

/* SIZE SELECT */
.sizes {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
}

.size {
  border: 1px solid var(--border);
  padding: 8px 14px;
  cursor: pointer;
}
.size:hover {
  border-color: var(--sky);
  color: var(--sky);
}

/* BUTTON */
.buy-btn {
  display: inline-block;
  padding: 12px 28px;
  background: var(--sky);
  color: #000;
  text-decoration: none;
}
.buy-btn:hover {
  background: #fff;
}

/* FOOTER SAME */
/* FOOTER (EXACT COPY) */
footer {
  position: relative;
  z-index: 1;
  padding: 48px 24px 36px;
  border-top: 1px solid var(--border);
  background: var(--bg);

  display: flex;              /* 👈 ADD */
  flex-direction: column;     /* 👈 ADD */
  align-items: center;        /* 👈 ADD */
  text-align: center;         /* 👈 ADD */
}

.footer-logo {
  height: 32px;
  margin-bottom: 20px;
  opacity: 0.5;
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.footer-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.footer-links a:hover { color: var(--sky); }

.footer-copy {
  font-size: 12px;
  color: var(--muted);
}

.footer-copy span { color: var(--sky); }

    
/* MOBILE */
@media(max-width:800px){
  .product-page {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <a href="index.html">
    <img src="HajwLogo.png" class="logo">
  </a>

  <nav>
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- PRODUCT SECTION -->
<section class="product-page">

  <div class="product-image">
    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
  </div>

  <div class="product-details">
    <div class="product-title">Black Street Jacket</div>
    <div class="product-price">₹2,499</div>

    <div class="product-desc">
      Premium streetwear jacket crafted for comfort and bold style. 
      Designed with a modern urban aesthetic, perfect for everyday wear.
    </div>

    <div class="sizes">
      <div class="size">S</div>
      <div class="size">M</div>
      <div class="size">L</div>
      <div class="size">XL</div>
    </div>

    <a href="#" class="buy-btn">Buy Now</a>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <img src="HajwLogo.png" class="footer-logo">

  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </div>

  <div class="footer-copy">
    © 2026 <span>H A J W</span> — All rights reserved.
  </div>
</footer>

</body>
</html>
