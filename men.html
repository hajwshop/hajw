<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAJW — Men's Wear</title>

<link rel="icon" type="image/png" href="HajwFavicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky: #38bdf8;
  --sky-dim: rgba(56,189,248,0.12);
  --sky-glow: rgba(56,189,248,0.35);
  --bg: #050508;
  --text: #e8eaf0;
  --muted: #5a6070;
  --border: rgba(56,189,248,0.15);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  overflow-x: hidden;
}

/* NOISE */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.5;
}

/* GLOW ORBS */
.glow-orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
.glow-orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(56,189,248,0.06), transparent); top: -100px; left: -100px; }
.glow-orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(56,189,248,0.05), transparent); bottom: 20%; right: -80px; }

/* HEADER (EXACT) */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #000;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 90px;
}

.logo-wrap { display: flex; align-items: center; text-decoration: none; }
.logo { height: 83px; object-fit: contain; }

.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
.hamburger span { width: 24px; height: 2px; background: var(--text); transition: 0.3s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

nav { display: flex; gap: 8px; }
nav a {
  color: var(--muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 8px 14px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
  position: relative;
}

nav a::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  right: 50%;
  height: 1px;
  background: var(--sky);
  transition: left 0.25s ease, right 0.25s ease;
}

nav a:hover {
  color: var(--sky);
  background: var(--sky-dim);
}

nav a:hover::after {
  left: 14px;
  right: 14px;
}
nav a:hover { color: var(--sky); }

/* PAGE TITLE */
.page-title {
  padding: 40px 20px 10px;
}
.page-title h1 {
  font-family: 'Bebas Neue';
  font-size: clamp(56px, 10vw, 90px);
  letter-spacing: 0.05em;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 24px;
  padding: 40px 24px 60px;
}

.product {
  background: #000;
  border: 1px solid rgba(56,189,248,0.1);
  border-radius: 8px;
  overflow: hidden;
  transition: 0.3s;
}
.product:hover {
  transform: translateY(-6px);
  border-color: var(--sky);
  box-shadow: 0 0 25px rgba(56,189,248,0.15);
}

.product img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.product-info {
  padding: 18px;
}

.product-name { margin-bottom: 6px; }
.product-price { color: var(--sky); margin-bottom: 12px; }

.buy-btn {
  padding: 10px 24px;
  background: var(--sky);
  color: #000;
  text-decoration: none;
  border-radius: 4px;
  font-size: 13px;
}
.buy-btn:hover { background: #fff; }

/* FOOTER (EXACT COPY) */
footer {
  position: relative;
  z-index: 1;
  padding: 48px 24px 36px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.footer-logo {
  height: 32px;
  margin-bottom: 20px;
  opacity: 0.5;
}
.footer-links {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.footer-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.footer-links a:hover { color: var(--sky); }
.footer-copy {
  font-size: 12px;
  color: var(--muted);
}
.footer-copy span { color: var(--sky); }

/* MOBILE */
@media (max-width:640px){
  .hamburger { display:flex; }
  nav {
    position: fixed;
    inset: 0;
    flex-direction: column;
    justify-content: center;
    background: rgba(5,5,8,0.97);
    transform: translateX(100%);
  }
  nav.open { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<!-- FOOTER -->
<footer>
  <img src="HajwLogo.png" class="footer-logo">
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </div>
  <div class="footer-copy">© 2026 <span>H A J W</span> — All rights reserved.</div>
</footer>

<script>
const hamburger = document.getElementById("hamburger");
const nav = document.getElementById("nav");

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("open");
  nav.classList.toggle("open");
});
</script>

</body>
</html>
