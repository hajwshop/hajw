<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAJW</title>
<link rel="icon" type="image/png" href="HajwFavicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #38bdf8;
    --sky-dim: rgba(56,189,248,0.12);
    --sky-glow: rgba(56,189,248,0.35);
    --bg: #050508;
    --text: #e8eaf0;
    --muted: #5a6070;
    --border: rgba(56,189,248,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    text-align: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  .glow-orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .glow-orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%); top: -100px; left: -100px; }
  .glow-orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, transparent 70%); bottom: 20%; right: -80px; }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #000;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 90px;
    animation: slideDown 0.6s ease both;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap { display: flex; align-items: center; text-decoration: none; }
  .logo { height: 83px; width: auto; max-width: 273px; object-fit: contain; display: block; filter: brightness(1.05); }

  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; border: none; background: none; z-index: 200; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s ease; transform-origin: center; }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  nav { display: flex; align-items: center; gap: 8px; }
  nav a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 14px; border-radius: 6px; transition: color 0.2s, background 0.2s; position: relative; }
  nav a::after { content: ''; position: absolute; bottom: 4px; left: 50%; right: 50%; height: 1px; background: var(--sky); transition: left 0.25s ease, right 0.25s ease; }
  nav a:hover { color: var(--sky); background: var(--sky-dim); }
  nav a:hover::after { left: 14px; right: 14px; }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 40px;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 80%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 12vw, 110px);
    line-height: 0.92;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
    background: linear-gradient(160deg, #ffffff 40%, #8ab4c8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fadeUp 0.7s 0.2s ease both;
  }
  .hero-line { width: 60px; height: 2px; background: var(--sky); margin: 0 auto 28px; opacity: 0; animation: fadeUp 0.7s 0.3s ease both; }
  .hero p { font-size: clamp(15px, 2.5vw, 19px); color: var(--muted); font-weight: 300; font-style: italic; letter-spacing: 0.05em; max-width: 440px; line-height: 1.7; opacity: 0; animation: fadeUp 0.7s 0.4s ease both; }

  .btn-group { display: flex; justify-content: center; margin-top: 36px; opacity: 0; animation: fadeUp 0.7s 0.5s ease both; }
  .button { display: inline-block; padding: 13px 40px; background: var(--sky); color: #000; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; }
  .button:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 8px 32px var(--sky-glow); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CATEGORY CARDS ── */
  .categories {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 24px;
    justify-content: center;
    padding: 16px 24px 64px;
    flex-wrap: wrap;
  }

  .cat-card {
    position: relative;
    width: 320px;
    height: 320px;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
    text-decoration: none;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    background: #000;
  }
  .cat-card:hover { transform: translateY(-7px); }

  /* Men — dark deep navy smoke, zero white */
  .cat-men {
    border: 1px solid rgba(56,189,248,0.1);
    box-shadow: 0 0 0 0 transparent;
  }
  .cat-men:hover {
    border-color: rgba(56,189,248,0.28);
    box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 28px rgba(56,189,248,0.12);
  }

  /* Women — dark charcoal smoke, zero white */
  .cat-women {
    border: 1px solid rgba(160,100,255,0.1);
    box-shadow: 0 0 0 0 transparent;
  }
  .cat-women:hover {
    border-color: rgba(160,100,255,0.28);
    box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 28px rgba(160,100,255,0.12);
  }

  /* Animated smoke layer */
  .cat-smoke {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .cat-men .cat-smoke {
    background: radial-gradient(ellipse 90% 80% at 50% 50%, #0a1018 0%, #000 100%);
    animation: smokeDriftMen 8s ease-in-out infinite alternate;
  }
  .cat-women .cat-smoke {
    background: radial-gradient(ellipse 90% 80% at 50% 50%, #0e080f 0%, #000 100%);
    animation: smokeDriftWomen 8s ease-in-out infinite alternate;
  }

  @keyframes smokeDriftMen {
    0%   { background: radial-gradient(ellipse 100% 80% at 30% 40%, #0c1520 0%, #040810 60%, #000 100%); }
    25%  { background: radial-gradient(ellipse 80% 100% at 70% 30%, #081018 0%, #030710 65%, #000 100%); }
    50%  { background: radial-gradient(ellipse 110% 70% at 50% 70%, #0a1520 0%, #040a14 60%, #000 100%); }
    75%  { background: radial-gradient(ellipse 90% 90% at 20% 60%, #09121c 0%, #03080f 65%, #000 100%); }
    100% { background: radial-gradient(ellipse 100% 80% at 80% 40%, #0b1620 0%, #040910 60%, #000 100%); }
  }

  @keyframes smokeDriftWomen {
    0%   { background: radial-gradient(ellipse 100% 80% at 70% 40%, #100818 0%, #08030f 60%, #000 100%); }
    25%  { background: radial-gradient(ellipse 80% 100% at 30% 60%, #0c0614 0%, #060210 65%, #000 100%); }
    50%  { background: radial-gradient(ellipse 110% 70% at 50% 30%, #110818 0%, #09030e 60%, #000 100%); }
    75%  { background: radial-gradient(ellipse 90% 90% at 80% 70%, #0e0714 0%, #07030f 65%, #000 100%); }
    100% { background: radial-gradient(ellipse 100% 80% at 20% 50%, #120916 0%, #080310 60%, #000 100%); }
  }

  /* Very faint colour pulse — dark, not bright */
  .cat-glow {
    position: absolute;
    inset: 0;
    z-index: 1;
    border-radius: 8px;
  }
  .cat-men .cat-glow {
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(20,80,120,0.18) 0%, transparent 70%);
    animation: glowPulseMen 4s ease-in-out infinite alternate;
  }
  .cat-women .cat-glow {
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(80,20,120,0.18) 0%, transparent 70%);
    animation: glowPulseWomen 4s ease-in-out infinite alternate;
  }
  @keyframes glowPulseMen {
    0%   { opacity: 0.5; transform: scale(0.92); }
    100% { opacity: 1;   transform: scale(1.08); }
  }
  @keyframes glowPulseWomen {
    0%   { opacity: 1;   transform: scale(1.08); }
    100% { opacity: 0.5; transform: scale(0.92); }
  }

  /* Overlay: label + button sit above smoke */
  .cat-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 28px;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.05) 55%, transparent 100%);
  }

  .cat-icon {
    font-size: 60px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -65%);
    transition: transform 0.35s ease;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8));
  }
  .cat-card:hover .cat-icon { transform: translate(-50%, -75%); }

  .cat-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.14em;
    color: #fff;
    margin-bottom: 12px;
  }

  .cat-btn {
    display: inline-block;
    padding: 8px 24px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.85);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 3px;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .cat-men:hover .cat-btn { background: var(--sky); border-color: var(--sky); color: #000; }
  .cat-women:hover .cat-btn { background: #a064ff; border-color: #a064ff; color: #000; }

  /* ── FOOTER ── */
  footer { position: relative; z-index: 1; padding: 48px 24px 36px; border-top: 1px solid var(--border); background: var(--bg); }
  .footer-logo { height: 32px; width: auto; object-fit: contain; margin-bottom: 20px; opacity: 0.5; }
  .footer-links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
  .footer-links a { color: var(--muted); text-decoration: none; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
  .footer-links a:hover { color: var(--sky); }
  .footer-copy { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .footer-copy span { color: var(--sky); }

  /* ── MUSIC BUTTON ── */
  #musicBtn { position: fixed; bottom: 24px; right: 24px; z-index: 999; padding: 10px 18px; background: rgba(13,13,20,0.9); backdrop-filter: blur(12px); color: var(--text); border: 1px solid var(--border); border-radius: 40px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; transition: all 0.25s ease; display: flex; align-items: center; gap: 8px; }
  #musicBtn:hover { background: var(--sky); color: #000; border-color: var(--sky); box-shadow: 0 0 20px var(--sky-glow); }
  .music-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sky); transition: background 0.2s; flex-shrink: 0; }
  #musicBtn:hover .music-dot { background: #000; }
  .music-dot.playing { animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    header { padding: 0 16px; height: 72px; }
    .logo { height: 62px; }
    .hamburger { display: flex; }
    nav { position: fixed; inset: 0; flex-direction: column; justify-content: center; background: rgba(5,5,8,0.97); backdrop-filter: blur(24px); z-index: 150; gap: 4px; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    nav.open { transform: translateX(0); }
    nav a { font-size: 28px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; padding: 14px 24px; width: 100%; color: var(--text); }
    nav a::after { display: none; }
    nav a:hover { background: none; color: var(--sky); }
    .hero { padding: 28px 20px 32px; }
    .categories { padding: 16px 16px 48px; gap: 16px; }
    .cat-card { width: 100%; max-width: 360px; height: 280px; }
    #musicBtn { bottom: 16px; right: 16px; padding: 9px 14px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<!-- HEADER -->
<header>
  <a href="#" class="logo-wrap">
    <img src="HajwLogo.png" class="logo" alt="HAJW">
  </a>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <nav id="mainNav">
    <a href="#" onclick="closeMenu()">Home</a>
    <a href="#" onclick="closeMenu()">About</a>
    <a href="#" onclick="closeMenu()">Projects</a>
    <a href="#" onclick="closeMenu()">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>H A J W</h1>
  <div class="hero-line"></div>
  <p>Styled for the Future.</p>
  <div class="btn-group">
    <a class="button" href="#">Shop Now</a>
  </div>
</section>

<!-- CATEGORIES -->
<section class="categories">

  <!-- Men's Wear -->
  <a class="cat-card cat-men" href="#">
    <div class="cat-smoke"></div>
    <div class="cat-glow"></div>
    <div class="cat-overlay">
      <span class="cat-icon">👔</span>
      <div class="cat-label">Men's Wear</div>
      <span class="cat-btn">Shop Men</span>
    </div>
  </a>

  <!-- Women's Wear -->
  <a class="cat-card cat-women" href="#">
    <div class="cat-smoke"></div>
    <div class="cat-glow"></div>
    <div class="cat-overlay">
      <span class="cat-icon">👗</span>
      <div class="cat-label">Women's Wear</div>
      <span class="cat-btn">Shop Women</span>
    </div>
  </a>

</section>

<!-- FOOTER -->
<footer>
  <img src="HajwLogo.png" class="footer-logo" alt="HAJW">
  <div class="footer-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </div>
  <div class="footer-copy">© 2026 <span>H A J W</span> — All rights reserved.</div>
</footer>

<!-- AUDIO -->
<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="toggleMusic()">
  <span class="music-dot" id="musicDot"></span>
  <span id="musicLabel">Play Music</span>
</button>

<script>
  const music = document.getElementById("bgmusic");
  const dot   = document.getElementById("musicDot");
  const label = document.getElementById("musicLabel");
  let playing = false;

  function toggleMusic() {
    if (!playing) {
      music.muted = false; music.play();
      label.textContent = "Mute"; dot.classList.add("playing"); playing = true;
    } else if (!music.muted) {
      music.muted = true; label.textContent = "Unmute"; dot.classList.remove("playing");
    } else {
      music.muted = false; label.textContent = "Mute"; dot.classList.add("playing");
    }
  }

  const hamburger = document.getElementById("hamburger");
  const nav = document.getElementById("mainNav");
  hamburger.addEventListener("click", () => {
    hamburger.classList.toggle("open");
    nav.classList.toggle("open");
    document.body.style.overflow = nav.classList.contains("open") ? "hidden" : "";
  });
  function closeMenu() {
    hamburger.classList.remove("open");
    nav.classList.remove("open");
    document.body.style.overflow = "";
  }
</script>
</body>
</html>
