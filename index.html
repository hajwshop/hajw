<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAJW</title>

<link rel="icon" type="image/png" href="HajwFavicon.png">

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

header{
padding:40px;
}

.logo{
width:220px;
transition: transform 0.1s linear, filter 0.1s linear;
}

nav{
background:#111;
padding:15px;
}

nav a{
color:white;
text-decoration:none;
margin:0 20px;
font-size:18px;
}

.hero{
padding:120px 20px;
}

.hero h1{
font-size:50px;
}

footer{
margin-top:100px;
padding:30px;
color:#888;
}

/* music button */

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 18px;
background:#111;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#musicBtn:hover{
background:#38bdf8;
color:black;
}

</style>

</head>

<body>

<header>
<img src="HajwLogo.png" class="logo" id="logo">
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>

<section class="hero">

<h1>Welcome to H A J W</h1>
<p>Styled for the Future</p>

</section>

<footer>
© 2026 H A J W
</footer>

<audio id="bgmusic" src="music.mp3" loop></audio>

<button onclick="startMusic()" id="musicBtn">
🎵 Start Music
</button>

<script>

let audio = document.getElementById("bgmusic");
let logo = document.getElementById("logo");

let audioContext;
let analyser;
let source;
let dataArray;

function startMusic(){

audio.play();

audioContext = new AudioContext();
source = audioContext.createMediaElementSource(audio);

analyser = audioContext.createAnalyser();
analyser.fftSize = 256;

let bufferLength = analyser.frequencyBinCount;
dataArray = new Uint8Array(bufferLength);

source.connect(analyser);
analyser.connect(audioContext.destination);

animate();

}

function animate(){

requestAnimationFrame(animate);

analyser.getByteFrequencyData(dataArray);

let bass = dataArray[1]; 

let scale = 1 + bass / 400;
let glow = bass / 2;

logo.style.transform = "scale(" + scale + ")";
logo.style.filter = "drop-shadow(0 0 "+glow+"px cyan)";

}

</script>

</body>
</html>
